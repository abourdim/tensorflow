<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hacker Lab — Certificates</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:#0a0f0d;color:#e8f0ec;min-height:100vh;padding:16px}
.bism{font-family:'Amiri',serif;font-size:1.7rem;font-weight:700;color:#39ff85;text-align:center;padding:20px 0 8px}
h1{text-align:center;font-size:1.5rem;margin-bottom:4px}
.sub{text-align:center;color:#8fa89a;margin-bottom:20px}
.app{max-width:600px;margin:0 auto}
.form{display:flex;flex-direction:column;gap:12px;background:#111a16;border:1px solid #1e2e26;border-radius:12px;padding:20px;margin-bottom:20px}
.form label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:#39ff85;letter-spacing:1px}
.form input,.form select{padding:11px 14px;border-radius:8px;border:1px solid #1e2e26;background:#0a0f0d;
  color:#e8f0ec;font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:border .3s}
.form input:focus,.form select:focus{border-color:#39ff85}
.form button{padding:13px;border-radius:10px;border:2px solid #39ff85;background:transparent;color:#39ff85;
  font-family:'JetBrains Mono',monospace;cursor:pointer;font-size:.85rem;transition:all .3s;text-transform:uppercase;letter-spacing:1px}
.form button:hover{background:#39ff85;color:#0a0f0d}

/* Certificate */
.cert{display:none;max-width:700px;margin:20px auto;background:#fffdf8;color:#1a2b20;border-radius:4px;
  padding:0;position:relative;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.cert-inner{padding:48px 48px 36px;position:relative;z-index:1}
/* Geometric border */
.cert::before{content:'';position:absolute;inset:12px;border:2px solid #0d7377;pointer-events:none;z-index:2}
.cert::after{content:'';position:absolute;inset:16px;border:1px solid rgba(13,115,119,.3);pointer-events:none;z-index:2}
/* Corner ornaments */
.corner{position:absolute;width:30px;height:30px;z-index:3}
.corner svg{width:100%;height:100%}
.corner.tl{top:8px;left:8px}.corner.tr{top:8px;right:8px;transform:rotate(90deg)}
.corner.bl{bottom:8px;left:8px;transform:rotate(-90deg)}.corner.br{bottom:8px;right:8px;transform:rotate(180deg)}

.cert .c-bism{font-family:'Amiri',serif;font-size:1.6rem;color:#0d7377;text-align:center;margin-bottom:20px}
.cert .c-header{text-align:center;margin-bottom:8px}
.cert .c-org{font-size:1.4rem;font-weight:800;color:#0d7377;letter-spacing:2px;text-transform:uppercase}
.cert .c-type{font-size:.85rem;color:#5a7568;margin-top:2px}
.cert .c-divider{width:120px;height:2px;background:linear-gradient(90deg,transparent,#0d7377,transparent);margin:16px auto}
.cert .c-label{font-size:.75rem;color:#8fa89a;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:4px}
.cert .c-name{font-size:2rem;font-weight:800;color:#1a2b20;text-align:center;margin-bottom:6px}
.cert .c-title{font-size:1.1rem;color:#0d7377;font-weight:700;text-align:center;margin-bottom:4px}
.cert .c-work{font-size:.88rem;color:#5a7568;text-align:center;margin-bottom:20px}
.cert .c-desc{font-size:.82rem;color:#5a7568;text-align:center;max-width:400px;margin:0 auto 20px;line-height:1.6}
.cert .c-date{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#8fa89a;text-align:center}
.cert .c-ftr{font-size:.7rem;color:#8fa89a;text-align:center;margin-top:16px}

.print-area{text-align:center;margin:16px 0}
.print-btn{padding:12px 28px;border-radius:10px;border:2px solid #39ff85;background:transparent;color:#39ff85;
  font-family:'JetBrains Mono',monospace;cursor:pointer;font-size:.82rem;transition:all .3s}
.print-btn:hover{background:#39ff85;color:#0a0f0d}

.ftr{text-align:center;padding:20px;font-size:.72rem;color:#5a7568}
.ftr a{color:#39ff85;text-decoration:none}

@media print{
  body{background:#fff;padding:0}
  .bism,h1,.sub,.form,.print-area,.ftr{display:none}
  .cert{display:block!important;box-shadow:none;margin:0;max-width:100%;border-radius:0}
}
.cb.lang{font-size:.65rem;font-weight:700;width:auto;padding:0 8px;font-family:monospace}
</style>
</head>
<body>
<div class="bism">بسم الله الرحمن الرحيم</div>
<h1>🏅 Certificates</h1>
<p class="sub">Generate &amp; print a beautiful completion certificate</p>
<div class="app">
<div class="form">
<label>PARTICIPANT NAME</label>
<input type="text" id="cName" placeholder="Enter full name">
<label>WORKSHOP COMPLETED</label>
<select id="cWork">
<option value="Junior Machine Hacker|Workshop 1: Sort Mission|Ages 6-9|Demonstrated understanding of classification, feature recognition, and pattern-based sorting through interactive AI missions.">Workshop 1: Junior Hacker (6-9)</option>
<option value="Certified Code Breaker|Workshop 2: Train the AI|Ages 10-13|Collected training data, built and trained a neural network, and tested AI predictions through hands-on machine learning.">Workshop 2: Code Breaker (10-13)</option>
<option value="Certified AI Engineer|Workshop 3: Build & Deploy|Ages 14+|Designed neural network architectures, trained models with real data, and experimented with hyperparameters using TensorFlow.js.">Workshop 3: AI Engineer (14+)</option>
<option value="AI Workshop Facilitator|Workshop 4: AI Decoded|Parents & Teachers|Completed the AI literacy program and is qualified to facilitate AI Hacker Lab workshops for all age groups.">Workshop 4: Facilitator</option>
<option value="Hardware Hacker|Hardware Lab Projects|All Ages|Completed hands-on hardware + AI integration projects using micro:bit and/or ESP32-C3 microcontrollers.">Hardware Lab</option>
</select>
<button onclick="genCert()">Generate Certificate</button>
</div>

<div class="cert" id="cert">
<div class="corner tl"><svg viewBox="0 0 30 30"><path d="M0 30 L0 0 L30 0" fill="none" stroke="#0d7377" stroke-width="2"/><path d="M0 20 L0 8 L8 8 L8 0" fill="none" stroke="rgba(13,115,119,.4)" stroke-width="1"/></svg></div>
<div class="corner tr"><svg viewBox="0 0 30 30"><path d="M0 30 L0 0 L30 0" fill="none" stroke="#0d7377" stroke-width="2"/><path d="M0 20 L0 8 L8 8 L8 0" fill="none" stroke="rgba(13,115,119,.4)" stroke-width="1"/></svg></div>
<div class="corner bl"><svg viewBox="0 0 30 30"><path d="M0 30 L0 0 L30 0" fill="none" stroke="#0d7377" stroke-width="2"/><path d="M0 20 L0 8 L8 8 L8 0" fill="none" stroke="rgba(13,115,119,.4)" stroke-width="1"/></svg></div>
<div class="corner br"><svg viewBox="0 0 30 30"><path d="M0 30 L0 0 L30 0" fill="none" stroke="#0d7377" stroke-width="2"/><path d="M0 20 L0 8 L8 8 L8 0" fill="none" stroke="rgba(13,115,119,.4)" stroke-width="1"/></svg></div>
<div class="cert-inner">
<div class="c-bism">بسم الله الرحمن الرحيم</div>
<div class="c-header"><div class="c-org">AI Hacker Lab</div><div class="c-type">Certificate of Completion</div></div>
<div class="c-divider"></div>
<div class="c-label">This certifies that</div>
<div class="c-name" id="certNameDisplay"></div>
<div class="c-title" id="certTitle"></div>
<div class="c-work" id="certWork"></div>
<div class="c-desc" id="certDesc"></div>
<div class="c-divider"></div>
<div class="c-date" id="certDate"></div>
<div class="c-ftr">Powered by workshop-diy.org</div>
</div>
</div>
<div class="print-area" id="printArea" style="display:none">
<button class="print-btn" onclick="window.print()">🖨️ Print Certificate</button>
</div>
</div>
<div class="ftr">Powered by <a href="https://workshop-diy.org" target="_blank">workshop-diy.org</a></div>
<script>
function genCert(){
  const name=document.getElementById('cName').value.trim();
  if(!name){document.getElementById('cName').style.borderColor='#ff4757';return}
  const[title,work,age,desc]=document.getElementById('cWork').value.split('|');
  document.getElementById('certNameDisplay').textContent=name;
  document.getElementById('certTitle').textContent=title;
  document.getElementById('certWork').textContent='Completed: '+work+' ('+age+')';
  document.getElementById('certDesc').textContent=desc;
  document.getElementById('certDate').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  document.getElementById('cert').style.display='block';
  document.getElementById('printArea').style.display='block';
  document.getElementById('cert').scrollIntoView({behavior:'smooth'});
}
</script>
<button class="cb lang" id="_lnB" onclick="_cycleLang()" style="font-size:.65rem;font-weight:700;width:auto;padding:0 8px">EN</button>

<script>
const _i18n = {"en": {"title": "Certificates", "sub": "Generate & print a completion certificate", "nameLabel": "Participant Name", "genBtn": "Generate Certificate"}, "ar": {"title": "الشهادات", "sub": "أنشئ واطبع شهادة إتمام", "nameLabel": "اسم المشارك", "genBtn": "أنشئ الشهادة"}, "fr": {"title": "Certificats", "sub": "Générer et imprimer un certificat", "nameLabel": "Nom du participant", "genBtn": "Générer le certificat"}};
let _lang = 'en';
function _cycleLang() {
  const langs = ['en', 'ar', 'fr'];
  _lang = langs[(langs.indexOf(_lang) + 1) % langs.length];
  document.getElementById('_lnB').textContent = _lang.toUpperCase();
  document.documentElement.lang = _lang === 'ar' ? 'ar' : _lang;
  document.documentElement.dir = _lang === 'ar' ? 'rtl' : 'ltr';
  const t = _i18n[_lang] || _i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k]) el.textContent = t[k];
  });
  if (t.title) document.title = t.title;
  try { localStorage.setItem('aih-lang', _lang); } catch(e) {}
}
(function() {
  try {
    const s = localStorage.getItem('aih-lang');
    if (s && _i18n[s]) { _lang = s; _cycleLang(); }
  } catch(e) {}
})();
</script>

</body>
</html>
