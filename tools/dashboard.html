<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hacker Lab — Parent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#faf8f5;color:#2c2c2c;min-height:100vh;padding:16px}
.bism{font-family:'Amiri',serif;font-size:1.7rem;font-weight:700;color:#0d7377;text-align:center;padding:20px 0 8px}
h1{text-align:center;font-size:1.5rem;margin-bottom:4px}
.sub{text-align:center;color:#5a5a5a;margin-bottom:20px;font-size:.92rem}
.app{max-width:620px;margin:0 auto}

/* Progress overview */
.overview{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.ov-card{background:#fff;border:1px solid #e0dcd5;border-radius:10px;padding:16px;text-align:center}
.ov-val{font-family:'DM Mono',monospace;font-size:1.8rem;font-weight:700;color:#0d7377}
.ov-label{font-size:.72rem;color:#999;text-transform:uppercase;margin-top:2px}

/* Badge grid */
.bg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin:16px 0}
.bc{background:#fff;border:1px solid #e0dcd5;border-radius:12px;padding:16px;text-align:center;transition:all .3s}
.bc.earned{border-color:#0d7377;background:rgba(13,115,119,.03)}
.bc.locked{opacity:.35}
.bc .bi{font-size:2.2rem;margin-bottom:4px}
.bc .bn{font-size:.88rem;font-weight:600;margin-bottom:2px}
.bc .bw{font-size:.72rem;color:#999}
.bc .bs{font-family:'DM Mono',monospace;font-size:.68rem;margin-top:4px;padding:3px 8px;border-radius:4px;display:inline-block}
.bc.earned .bs{color:#0d7377;background:rgba(13,115,119,.08)}
.bc.locked .bs{color:#999;background:#f0f0f0}

/* Recommendation */
.reco{background:#fff;border:1px solid #e0dcd5;border-radius:12px;padding:18px;margin:16px 0}
.reco h3{font-size:1rem;color:#0d7377;margin-bottom:6px}
.reco p{font-size:.88rem;color:#5a5a5a;line-height:1.6}
.reco .next{margin-top:8px;padding:10px 14px;background:rgba(13,115,119,.05);border-radius:8px;
  font-size:.85rem;color:#0d7377;border-left:3px solid #0d7377}

/* Skills */
.skills{margin:16px 0}
.skills h3{font-size:1rem;color:#0d7377;margin-bottom:8px}
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.skill{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#fff;border:1px solid #e0dcd5;border-radius:8px;font-size:.82rem}
.skill.done{border-color:#0d7377;background:rgba(13,115,119,.03)}
.skill .check{width:16px;height:16px;border-radius:4px;border:2px solid #ccc;flex-shrink:0}
.skill.done .check{border-color:#0d7377;background:#0d7377;position:relative}
.skill.done .check::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.6rem}

/* Reset */
.reset{text-align:center;margin:20px 0}
.reset button{padding:8px 20px;border-radius:8px;border:1px solid #e0dcd5;background:#fff;color:#999;
  font-size:.78rem;cursor:pointer;transition:all .3s}
.reset button:hover{border-color:#d4384a;color:#d4384a}

.ftr{text-align:center;padding:20px;font-size:.72rem;color:#999}.ftr a{color:#0d7377;text-decoration:none}
.cb.lang{font-size:.65rem;font-weight:700;width:auto;padding:0 8px;font-family:monospace}
</style>
</head>
<body>
<div class="bism">بسم الله الرحمن الرحيم</div>
<h1>📊 Parent Dashboard</h1>
<p class="sub">Track your child's AI learning journey</p>
<div class="app">
<div class="overview" id="overview"></div>
<h2 style="font-size:1rem;color:#0d7377;margin:16px 0 4px">🏆 Badges</h2>
<div class="bg" id="badges"></div>
<div class="reco" id="reco"></div>
<div class="skills">
<h3>📚 Skills Learned</h3>
<div class="skill-grid" id="skills"></div>
</div>
<div class="reset"><button onclick="if(confirm('Clear all progress? This cannot be undone.')){localStorage.removeItem('ai-hacker-badges');location.reload()}">Reset All Progress</button></div>
</div>
<div class="ftr">Powered by <a href="https://workshop-diy.org" target="_blank">workshop-diy.org</a></div>
<script>
const allB=[
{id:'junior-machine-hacker',name:'Junior Machine Hacker',icon:'🤖',w:'Workshop 1 (Ages 6-9)',skills:['Classification','Pattern Recognition','Feature Identification']},
{id:'code-breaker',name:'Code Breaker',icon:'🕵️',w:'Workshop 2 (Ages 10-13)',skills:['Training Data','Neural Networks','Accuracy & Loss']},
{id:'ai-engineer',name:'AI Engineer',icon:'⚡',w:'Workshop 3 (Ages 14+)',skills:['Model Architecture','Hyperparameters','TensorFlow.js']},
{id:'facilitator',name:'Facilitator',icon:'🎓',w:'Workshop 4 (Parents)',skills:['AI Literacy','Ethics & Values','Facilitation']},
{id:'hardware-hacker',name:'Hardware Hacker',icon:'🔧',w:'Hardware Lab',skills:['micro:bit','ESP32-C3','Edge AI']}];
let earned=[];try{earned=JSON.parse(localStorage.getItem('ai-hacker-badges')||'[]')}catch(e){}
const ec=earned.length;

// Overview
document.getElementById('overview').innerHTML=
`<div class="ov-card"><div class="ov-val">${ec}</div><div class="ov-label">Badges Earned</div></div>
<div class="ov-card"><div class="ov-val">${allB.length}</div><div class="ov-label">Total Available</div></div>
<div class="ov-card"><div class="ov-val">${Math.round(ec/allB.length*100)}%</div><div class="ov-label">Complete</div></div>`;

// Badges
const bg=document.getElementById('badges');
allB.forEach(b=>{const has=earned.includes(b.id);
bg.innerHTML+=`<div class="bc ${has?'earned':'locked'}"><div class="bi">${b.icon}</div><div class="bn">${b.name}</div><div class="bw">${b.w}</div><div class="bs">${has?'✓ Earned':'🔒 Locked'}</div></div>`});

// Skills
const sg=document.getElementById('skills');
allB.forEach(b=>{const has=earned.includes(b.id);
b.skills.forEach(s=>{sg.innerHTML+=`<div class="skill ${has?'done':''}"><div class="check"></div>${s}</div>`})});

// Recommendation
const reco=document.getElementById('reco');
if(ec===0)reco.innerHTML='<h3>🚀 Getting Started</h3><p>No badges yet! Start the journey:</p><div class="next">Ages 6-9 → Open workshop-1.html<br>Ages 10-13 → Open workshop-2.html<br>Ages 14+ → Open workshop-3.html</div>';
else if(ec<allB.length){const next=allB.find(b=>!earned.includes(b.id));
reco.innerHTML=`<h3>🎯 Next Up</h3><p>${ec} of ${allB.length} badges earned — great progress!</p><div class="next">Recommended next: <strong>${next.name}</strong> (${next.w})</div>`}
else reco.innerHTML='<h3>🎉 All Complete!</h3><p>Every badge earned! Your child has completed the full AI Hacker Lab curriculum. Consider exploring the Hardware Lab for advanced hands-on projects.</p>';
</script>
<button class="cb lang" id="_lnB" onclick="_cycleLang()" style="font-size:.65rem;font-weight:700;width:auto;padding:0 8px">EN</button>

<script>
const _i18n = {"en": {"title": "Parent Dashboard", "sub": "Track your child's AI learning journey"}, "ar": {"title": "لوحة الآباء", "sub": "تتبع رحلة تعلم طفلك للذكاء الاصطناعي"}, "fr": {"title": "Tableau de bord parents", "sub": "Suivez le parcours IA de votre enfant"}};
let _lang = 'en';
function _cycleLang() {
  const langs = ['en', 'ar', 'fr'];
  _lang = langs[(langs.indexOf(_lang) + 1) % langs.length];
  document.getElementById('_lnB').textContent = _lang.toUpperCase();
  document.documentElement.lang = _lang === 'ar' ? 'ar' : _lang;
  document.documentElement.dir = _lang === 'ar' ? 'rtl' : 'ltr';
  const t = _i18n[_lang] || _i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (t[k]) el.textContent = t[k];
  });
  if (t.title) document.title = t.title;
  try { localStorage.setItem('aih-lang', _lang); } catch(e) {}
}
(function() {
  try {
    const s = localStorage.getItem('aih-lang');
    if (s && _i18n[s]) { _lang = s; _cycleLang(); }
  } catch(e) {}
})();
</script>

</body>
</html>
